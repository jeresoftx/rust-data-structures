name: Docs

on:
  push:
  pull_request:

jobs:
  inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate course inventory
        run: |
          set -euo pipefail

          test -s README.md
          test -s AGENTS.md
          test -s ROADMAP.md
          test -s docs/SUMMARY.md
          test -s docs/01-vector.md
          test -s docs/02-linked-list.md
          test -s docs/03-stack.md
          test -s docs/04-queue.md
          test -s docs/05-deque.md
          test -s docs/06-heap.md
          test -s docs/07-trie.md
          test -s docs/08-graph.md
          test -s docs/09-btree.md
          test -s docs/10-hashmap.md
          test -s docs/11-bloom-filter.md
          test -s examples/README.md
          test -s tests/README.md
          test -s benches/README.md
          test -s benches/vector_bench.rs
          test -s benches/linked_list_bench.rs
          test -s benches/stack_bench.rs
          test -s benches/queue_bench.rs
          test -s benches/deque_bench.rs
          test -s benches/heap_bench.rs
          test -s benches/trie_bench.rs
          test -s benches/graph_bench.rs
          test -s benches/btree_bench.rs
          test -s benches/hashmap_bench.rs
          test -s benches/bloom_filter_bench.rs
          test -s diagrams/README.md
          test -s diagrams/01-vector.mmd
          test -s diagrams/02-linked-list.mmd
          test -s diagrams/03-stack.mmd
          test -s diagrams/04-queue.mmd
          test -s diagrams/05-deque.mmd
          test -s diagrams/06-heap.mmd
          test -s diagrams/07-trie.mmd
          test -s diagrams/08-graph.mmd
          test -s diagrams/09-btree.mmd
          test -s diagrams/10-hashmap.mmd
          test -s diagrams/11-bloom-filter.mmd
          test -s assets/README.md

          grep -q "Vector" docs/SUMMARY.md
          grep -q "Skip List" docs/SUMMARY.md
